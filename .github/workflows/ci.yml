name: ci

# Green PR gate. Runs the structure guards — the checks that protect the things
# unit tests can't reach: the dashboard client <script> must parse as valid JS, the
# dashboard CSS must be well-formed, and every shipped YAML config must parse. These
# are deliberately a SUBSET of `npm test`: the full suite is intentionally red during
# pre-launch design churn (hardened in a dedicated pass at launch), so gating on it
# would block every merge. The guards stay green and catch real breakage.
#
# This job's name ("structure-guards") is the status-check context referenced by the
# "Main branch protection" ruleset's required_status_checks rule.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  structure-guards:
    name: structure-guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Structure guards (client JS parses, CSS valid, YAML valid)
        run: node --test tests/client-script.test.mjs tests/styles.test.mjs tests/yaml.test.mjs
