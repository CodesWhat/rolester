# Browser automation — EXAMPLE (copy to candidate/automation.yml, which is gitignored).
#
# OPT-IN, DEFAULTS OFF. If this file is absent, NOTHING is automated — that is the
# safe default and the intended state for most users. Everything below is off until
# you deliberately turn it on, one capability and one platform at a time.
#
# THE RULE (read this once): a capability runs on a platform ONLY IF all three are true —
#   1. capabilities.<capability>.enabled            (the capability's global switch)
#   2. capabilities.<capability>.platforms.<name>   (that platform, for that capability)
#   3. consent.<name>                               (you've read that platform's ToS)
# Miss any one and the agent will not act — it tells you which switch is off.
#
# NO STORED CREDENTIALS. Rolester never stores your passwords. The browser session
# holds your logins: either the Chrome extension (preferred — it already has your
# logins + password store) or a Playwright persistent profile you sign into once per
# platform. See docs/BROWSER.md and AGENTS.md → Browser Automation Contract.
#
# TERMS OF SERVICE ARE YOUR CALL. Automating a logged-in platform may violate its
# terms. `consent.<platform>` is your one-time acknowledgment that you've read that
# platform's terms and accept the risk. The agent surfaces the ToS note, records your
# yes here, and NEVER runs on a schedule or without you in the loop.
#
# Don't hand-edit blindly — use the CLI (it validates + preserves these comments):
#   npm run automation -- status                     show the full matrix
#   npm run automation -- consent <platform> --write       record ToS consent
#   npm run automation -- enable <capability> [platform] --write
#   npm run automation -- disable <capability> [platform] --write
#   npm run automation -- revoke <platform> --write        withdraw consent

version: 1

# ── ToS consent — one-time, per platform ──────────────────────────────────────
# Set a platform true ONLY after you've read its automation terms. Withdraw with
# `npm run automation -- revoke <platform> --write`.
consent:
  linkedin: false
  indeed: false
  wellfound: false
  greenhouse: false
  workday: false
  ashby: false
  lever: false
  glassdoor: false
  gmail: false
  outlook: false
  webmail: false
  apple_calendar: false
  google_calendar: false
  outlook_calendar: false
  automation_tools: false
  work_calendar: false

# ── Capabilities ──────────────────────────────────────────────────────────────
# Each has a global `enabled` switch plus per-platform flags. Turn the capability
# on AND the platform on AND record consent for that platform (see THE RULE above).
capabilities:

  # Phase 1 — read-only application-status polling from your ATS dashboards.
  # The lowest-risk loop-closer: reads each application's status and hands
  # transitions to track-outcomes (still the only writer of tracker.json).
  status_polling:
    enabled: false
    platforms:
      greenhouse: false
      workday: false
      ashby: false
      lever: false

  # Phase 2 — logged-in search scanning (your saved searches, behind auth).
  authenticated_search:
    enabled: false
    platforms:
      linkedin: false
      indeed: false
      wellfound: false
      glassdoor: false

  # Phase 3 — read in-platform messages/DMs into communications[]. Highest ToS
  # exposure → strongest consent gate.
  messaging:
    enabled: false
    platforms:
      linkedin: false
      wellfound: false

  # Phase 4 — authenticated one-click / modal apply (e.g. LinkedIn Easy Apply),
  # under the SAME submit-safety gate as apply-job (auto_submit default false;
  # halt on captcha / 2FA / application limit and ask).
  one_click_apply:
    enabled: false
    platforms:
      linkedin: false

  # Phase 5 (M13) — LinkedIn profile optimizer. TWO separately-gated capabilities:
  # reading + suggesting profile rewrites is a different switch from writing them
  # back. profile_optimize is read-only (diffs your live profile against your
  # targeting + evidence and proposes honest rewrites); profile_apply lets the agent
  # write the approved edits back through the session browser, confirm-first PER
  # FIELD. Turning on suggestions never implies write-back.
  profile_optimize:
    enabled: false
    platforms:
      linkedin: false

  profile_apply:
    enabled: false
    platforms:
      linkedin: false

  # Phase 6 (M17) — session webmail access. Separately gated from in-platform
  # messaging and Apple Mail ingest. `webmail` is provider-agnostic and only for
  # one recent verification-code message during apply/sign-in flows. Gmail/Outlook
  # are also supported for opted-in webmail recruiting ingest. Never send, delete,
  # reply, archive, mark read, or browse the broader inbox. Halt on mail login
  # wall / 2FA / captcha.
  mail_access:
    enabled: false
    platforms:
      gmail: false
      outlook: false
      webmail: false

  # Phase 7 — opt-in relationship sourcing. Finds likely recruiters,
  # hiring-team members, or warm contacts for candidate review, then captures
  # reviewed leads into Network. Never sends messages or treats a found person
  # as an action path until the candidate approves the lead.
  relationship_sourcing:
    enabled: false
    platforms:
      linkedin: false
      wellfound: false

  # Phase 8 — confirm-first calendar provider sync. Builds on the no-auth
  # Calendar export path, but real provider writes stay behind their own gates.
  # Never writes on a schedule; every event/provider write needs a fresh user
  # request and confirmation.
  calendar_sync:
    enabled: false
    platforms:
      apple_calendar: false
      google_calendar: false
      outlook_calendar: false
      automation_tools: false

  # Phase 8 — read-only free/busy ingestion. Lets Rolester see your existing
  # commitments so it schedules interviews around them and renders "busy" blocks
  # on the Calendar. Busy times are stored OPAQUE — start/end only, no titles or
  # attendees. work_calendar = a work calendar open in your session browser
  # (e.g. via the Chrome extension); apple/google/outlook = personal calendars.
  calendar_read:
    enabled: false
    platforms:
      work_calendar: false
      apple_calendar: false
      google_calendar: false
      outlook_calendar: false

# ── Session browser (tool-agnostic) ───────────────────────────────────────────
# provider: extension (preferred — holds your logins) | playwright (persistent
# profile you log into once per platform). profile_root null = ~/.rolester/board-profiles.
session:
  provider: extension
  profile_root: null
