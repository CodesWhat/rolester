# Optional mode switches. If this file is absent, Rolester behaves as:
# usage_mode: standard
# application_mode: balanced
# agent_voice: standard
#
# usage_mode controls compute/cost/scope for discretionary work:
#   lean     - core loop stays full quality; expensive optional work skips/downshifts
#   standard - normal behavior
#   full     - deepest discretionary work when asked
#
# application_mode controls what Rolester does AFTER discovery:
#   selective   - broad discovery, stricter promotion/apply posture
#   balanced    - normal gate behavior
#   high-volume - broad discovery, more medium fits queued for review/application
#
# agent_voice controls how the agent talks TO YOU (not outbound artifact tone):
#   exec-summary - 1-3 lines; lead with the decision or number
#   standard     - scannable bullets/short lines, takeaway first (DEFAULT)
#   technical    - more depth and domain jargon; still structured, not a wall
#   verbose      - full detail with headers/bullets when you want everything
#
# Neither mode changes honesty, comp, consent, application-limit, or privacy gates.
usage_mode: "standard"
application_mode: "balanced"
agent_voice: "standard"

# company_health gates the (cost-bearing) company-health skill — role-scoped
# layoff/financial/sentiment risk research. Absent = the defaults shown here.
#   auto          - auto-fire on a stage transition (false = manual-only)
#   fire_at_stage - earliest stage that auto-fires: applied | interview | offer
#                   (interview keeps the researched set small; applied is broad+costly)
#   manual_always - allow on-demand runs at any stage when you explicitly ask
#   recheck_days  - re-research a cached rating once it's older than this many days
# The rating is an INTERNAL signal only and never enters an outbound artifact.
company_health:
  auto: true
  fire_at_stage: "interview"
  manual_always: true
  recheck_days: 14

# comp_estimate — staleness of the comparables-based comp estimate (compEstimate)
# persisted on tracker rows. Absent = the default shown here.
#   recheck_days  - re-estimate a cached compEstimate once its asOf is older than
#                   this many days (or on a major stage transition); fresher
#                   estimates are reused as-is.
comp_estimate:
  recheck_days: 30
