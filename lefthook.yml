# Git hooks for Rolester. Installed via `npx lefthook install` (runs through the
# `prepare` npm script after `npm install`).
#
# Adoption is incremental: Biome enforces only on the files a commit actually
# touches (so the pre-existing lint backlog doesn't block work), while the fast
# structural guards run every commit because they catch the class of bug that
# ships green through the test runner — a broken CSS/JS template literal that is
# never parsed in a browser by the suite. The full test suite runs on push.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,mjs,cjs,ts,json}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: structure-guards
      # Cheap parse/structure checks the test suite would otherwise ship green:
      # the embedded <style>/<script> template literals (never parsed in a
      # browser) and every shipped YAML config. Sub-second; safe to run always.
      run: node --test tests/styles.test.mjs tests/client-script.test.mjs tests/config-yaml-parses.test.mjs

pre-push:
  jobs:
    - name: tests
      run: npm test
